<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Tracker</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-800">

<div class="max-w-6xl mx-auto p-4">

<h1 class="text-3xl font-bold mb-6">Job Application Tracker</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
  <div class="bg-white p-4 rounded shadow">
    <p>Total</p>
    <h2 id="totalCount" class="text-2xl font-bold">0</h2>
  </div>

  <div class="bg-white p-4 rounded shadow">
    <p class="text-green-600">Interview</p>
    <h2 id="interviewCount" class="text-2xl font-bold">0</h2>
  </div>

  <div class="bg-white p-4 rounded shadow">
    <p class="text-red-600">Rejected</p>
    <h2 id="rejectedCount" class="text-2xl font-bold">0</h2>
  </div>
</div>

<div class="flex justify-between items-center mb-3">
  <h2 class="text-xl font-semibold">Available Jobs</h2>
  <span id="tabCount" class="text-gray-600"></span>
</div>

<div class="flex gap-2 mb-6">

  <button onclick="changeTab('all')" data-tab="all"
  class="tabBtn px-4 py-1 rounded transition-all duration-200">
  All
  </button>

  <button onclick="changeTab('interview')" data-tab="interview"
  class="tabBtn px-4 py-1 rounded transition-all duration-200">
  Interview
  </button>

  <button onclick="changeTab('rejected')" data-tab="rejected"
  class="tabBtn px-4 py-1 rounded transition-all duration-200">
  Rejected
  </button>

</div>

<div id="jobsContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</div>

<script src="script.js"></script>

</body>
</html>
