<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Tracker</title>


<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-800">

<div class="max-w-6xl mx-auto p-4">

<h1 class="text-3xl font-bold mb-6">Job Application Tracker</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
  <div class="bg-white p-4 rounded shadow">
    <p>Total</p>
    <h2 id="totalCount" class="text-2xl font-bold">0</h2>
  </div>

  <div class="bg-white p-4 rounded shadow">
    <p class="text-green-600">Interview</p>
    <h2 id="interviewCount" class="text-2xl font-bold">0</h2>
  </div>

  <div class="bg-white p-4 rounded shadow">
    <p class="text-red-600">Rejected</p>
    <h2 id="rejectedCount" class="text-2xl font-bold">0</h2>
  </div>
</div>



<div class="flex justify-between items-center mb-3">
  <h2 class="text-xl font-semibold">Available Jobs</h2>
  <span id="tabCount" class="text-gray-600"></span>
</div>

<div class="flex gap-2 mb-6">
  <button onclick="changeTab('all')" class="tabBtn bg-blue-500 text-white px-4 py-1 rounded">All</button>
  <button onclick="changeTab('interview')" class="tabBtn bg-gray-200 px-4 py-1 rounded">Interview</button>
  <button onclick="changeTab('rejected')" class="tabBtn bg-gray-200 px-4 py-1 rounded">Rejected</button>
</div>

<div id="jobsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

</div>

<script>


let jobs = [
{
id:1,
companyName:"Mobile First Corp",
position:"React Native Developer",
location:"Remote",
type:"Full-time",
salary:"$130k - $175k",
description:"Develop scalable cross-platform mobile apps used globally.",
status:"none"
},
{
id:2,
companyName:"CloudNova Ltd",
position:"Frontend Engineer",
location:"Singapore",
type:"Full-time",
salary:"$90k - $120k",
description:"Build modern UI using JavaScript and performance optimization.",
status:"none"
},
{
id:3,
companyName:"DataBridge AI",
position:"Machine Learning Intern",
location:"Remote",
type:"Internship",
salary:"$25/hr",
description:"Assist in training predictive AI models for analytics.",
status:"none"
},
{
id:4,
companyName:"CyberShield",
position:"Security Analyst",
location:"Germany",
type:"Full-time",
salary:"$100k",
description:"Monitor threats and strengthen enterprise security systems.",
status:"none"
},
{
id:5,
companyName:"PixelCraft Studio",
position:"UI/UX Designer",
location:"Canada",
type:"Contract",
salary:"$70k",
description:"Design intuitive user experiences for SaaS platforms.",
status:"none"
},
{
id:6,
companyName:"FinEdge Bank",
position:"Backend Developer",
location:"UK",
type:"Full-time",
salary:"$110k",
description:"Create secure APIs and financial transaction services.",
status:"none"
},
{
id:7,
companyName:"HealthSync",
position:"Software Engineer",
location:"Remote",
type:"Full-time",
salary:"$105k",
description:"Develop healthcare monitoring systems for hospitals.",
status:"none"
},
{
id:8,
companyName:"GreenTech Energy",
position:"Data Analyst",
location:"Netherlands",
type:"Hybrid",
salary:"$80k",
description:"Analyze renewable energy usage and forecasting data.",
status:"none"
}
];

let activeTab = "all";

function renderJobs(){

const container = document.getElementById("jobsContainer");

const filtered = jobs.filter(job =>
  activeTab === "all" ? true : job.status === activeTab
);

document.getElementById("tabCount").innerText =
filtered.length + " jobs";

if(filtered.length === 0){
container.innerHTML = `
<div class="col-span-full text-center bg-white p-10 rounded shadow">
<div class="mb-3">
  <img src="image/jobs.png" class="w-12 h-12 mx-auto" />
</div>
<h3 class="text-xl font-semibold">No jobs available</h3>
<p class="text-gray-500">Check back soon for new job opportunities</p>
</div>`;
return;
}

container.innerHTML = filtered.map(job=>{

let badge = "";

if(job.status === "none"){
badge = `<span class="bg-gray-200 text-gray-700 px-3 py-1 rounded text-sm font-medium">
NOT APPLIED
</span>`;
}
else if(job.status === "interview"){
badge = `<span class="bg-green-100 text-green-700 px-3 py-1 rounded text-sm font-medium">
INTERVIEW
</span>`;
}
else if(job.status === "rejected"){
badge = `<span class="bg-red-100 text-red-700 px-3 py-1 rounded text-sm font-medium">
REJECTED
</span>`;
}

return `
<div class="bg-white p-4 rounded shadow">

<div class="flex justify-between items-start">
<div>
<h3 class="font-semibold text-lg">${job.companyName}</h3>

</div>

<button 
  onclick="deleteJob(${job.id})"
  class="p-2 rounded hover:bg-red-200 transition"
>
  <img 
    src="image/Group 1.png" 
    alt="Delete" 
    class="w-7 h-7"
  />
</button>

</div>

<p class="text-lg mt-2">${job.position}</p>

<p class="text-sm text-gray-500">
${job.location} • ${job.type} • ${job.salary}
</p>
<div class="mt-2">${badge}</div>
<p class="my-2">${job.description}</p>

<div class="flex flex-col sm:flex-row gap-2 mt-3">

<button
onclick="setStatus(${job.id},'interview')"
class="px-3 py-1 border rounded
${job.status==='interview'?'bg-green-500 text-white':''}">
Interview
</button>

<button
onclick="setStatus(${job.id},'rejected')"
class="px-3 py-1 border rounded
${job.status==='rejected'?'bg-red-500 text-white':''}">
Rejected
</button>

</div>
</div>
`;

}).join("");
}

function setStatus(id,status){

const job = jobs.find(j=>j.id===id);

job.status = job.status === status ? "none" : status;

updateDashboard();
renderJobs();
}

function deleteJob(id){
jobs = jobs.filter(job=>job.id!==id);
updateDashboard();
renderJobs();
}

function updateDashboard(){

document.getElementById("totalCount").innerText = jobs.length;

document.getElementById("interviewCount").innerText =
jobs.filter(j=>j.status==="interview").length;

document.getElementById("rejectedCount").innerText =
jobs.filter(j=>j.status==="rejected").length;
}

function changeTab(tab){
activeTab=tab;
renderJobs();
}

updateDashboard();
renderJobs();

</script>

</body>
</html>
